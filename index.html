<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe ✨</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Meta tags for SEO & best practices -->
    <meta name="description" content="A futuristic, Gen Z styled Tic Tac Toe game with smooth glassmorphism and neon accents.">
</head>
<body>
    <div class="app-container">
        <header>
            <h1 class="title">TIC <span class="neon-pink">TAC</span> TOE <span class="emoji">🕹️</span></h1>
            <div class="status-board">
                <div class="player-indicator active" id="playerX">
                    <span class="avatar">🔥</span> Player X
                </div>
                <div class="player-indicator" id="playerO">
                    <span class="avatar">💀</span> Player O
                </div>
            </div>
            <div class="score-board">
                <div class="score-card">
                    <span>X Wins</span>
                    <strong id="scoreX">0</strong>
                </div>
                <div class="score-card">
                    <span>O Wins</span>
                    <strong id="scoreO">0</strong>
                </div>
            </div>
        </header>

        <main class="game-board-wrapper">
            <div class="game-board" id="board">
                <div class="cell" data-index="0"></div>
                <div class="cell" data-index="1"></div>
                <div class="cell" data-index="2"></div>
                <div class="cell" data-index="3"></div>
                <div class="cell" data-index="4"></div>
                <div class="cell" data-index="5"></div>
                <div class="cell" data-index="6"></div>
                <div class="cell" data-index="7"></div>
                <div class="cell" data-index="8"></div>
            </div>
        </main>

        <div class="controls">
            <h2 id="statusMessage" class="status-message">Your turn, 🔥!</h2>
            <button id="resetBtn" class="primary-btn">RESTART VIBES 🔄</button>
        </div>
    </div>

    <!-- Celebration Overlay -->
    <div class="overlay hidden" id="winnerOverlay">
        <div class="winner-modal glass">
            <h2 id="winnerText" class="winner-text">X WINS! 🎉</h2>
            <button id="nextGameBtn" class="primary-btn">PLAY AGAIN 🚀</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
